services:
  - type: web
    name: huezo-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn huezo_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    rootDir: .
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-flutter-app-domain.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: huezo-db
          property: connectionString
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "Huezo <bsrinithish@gmail.com>"

databases:
  - name: huezo-db
    databaseName: huezo
    plan: free
