services:
  - type: web
    name: huezo-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn huezo_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    rootDir: .
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "huezo.onrender.com,app.huezo.in"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-flutter-app-domain.com,https://app.huezo.in"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: huezo-db
          property: connectionString
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "Huezo <noreply@huezo.in>"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false

databases:
  - name: huezo-db
    databaseName: huezo
    plan: free
