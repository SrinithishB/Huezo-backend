<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — Huezo Admin</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        huezo: {
                            50: "#faf5f5",
                            100: "#fee2e2",
                            200: "#fecaca",
                            300: "#fca5a5",
                            400: "#f87171",
                            500: "#991b1b",
                            600: "#7f1d1d",
                            700: "#631a1a",
                            800: "#4c1919",
                            900: "#451515",
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glow-effect {
            box-shadow: 0 0 80px 10px rgba(153, 27, 27, 0.15);
        }
    </style>
</head>
<body class="h-full bg-slate-950 text-slate-100 flex items-center justify-center p-6 antialiased selection:bg-huezo-500 selection:text-white">

    <!-- Gradient Background Highlights -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-huezo-900/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-huezo-900/25 rounded-full blur-3xl"></div>
    </div>

    <!-- Content Card -->
    <div class="relative max-w-lg w-full bg-slate-900/60 border border-slate-800/80 rounded-3xl p-8 md:p-12 text-center backdrop-blur-xl glow-effect transition-all duration-300 hover:border-huezo-900/40">
        
        <!-- Icon -->
        <div class="mx-auto w-20 h-20 rounded-2xl bg-huezo-950/40 border border-huezo-800/50 flex items-center justify-center text-huezo-400 mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10 animate-pulse">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0-10.03V3m0 18v-3.75m9-5.25h-3.75M5.636 5.636l2.652 2.652m8.424 8.424 2.652 2.652M3 12h3.75m11.614 5.636-2.652-2.652M8.288 8.288l-2.652-2.652M12 17.25h.008v.008H12v-.008Z" />
            </svg>
        </div>

        <!-- Heading -->
        <span class="text-xs font-semibold tracking-widest text-huezo-400 uppercase">Error 500</span>
        <h1 class="text-3xl md:text-4xl font-bold text-white mt-3 mb-4 tracking-tight">Server Error</h1>
        
        <!-- Description -->
        <p class="text-slate-400 leading-relaxed text-sm md:text-base mb-8">
            An unexpected error occurred on our servers. We have been notified and are looking into it. Please try again shortly.
        </p>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <button onclick="window.history.back();" class="inline-flex items-center justify-center px-6 py-3 border border-slate-700/85 hover:border-slate-600 rounded-xl text-sm font-medium text-slate-300 hover:text-white bg-slate-950/20 hover:bg-slate-900 transition-all duration-200 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 mr-2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
                Go Back
            </button>
            <a href="/admin/" class="inline-flex items-center justify-center px-6 py-3 bg-huezo-500 hover:bg-huezo-600 active:bg-huezo-700 rounded-xl text-sm font-medium text-white shadow-lg shadow-huezo-900/35 hover:shadow-huezo-900/50 transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 mr-2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                </svg>
                Admin Home
            </a>
        </div>
    </div>

</body>
</html>
